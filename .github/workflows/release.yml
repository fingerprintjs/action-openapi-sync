name: Release
on:
  push:
    branches:
      - main
      - test

jobs:
  determine-changesets-step:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.changeset-determine-step.outputs.action }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: 'true'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine changesets step
        id: changeset-determine-step
        uses: fingerprintjs/dx-team-toolkit/.github/actions/changeset-determine-step@v1

  create-pr:
    runs-on: ubuntu-latest
    needs: determine-changesets-step
    if: needs.determine-changesets-step.outputs.action == 'pr'
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@f2acddfb5195534d487896a656232b016a682f3c
        id: app-token
        with:
          app-id: ${{ vars.RUNNER_APP_ID }}
          private-key: ${{ secrets.RUNNER_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release PR
        uses: changesets/action@c48e67d110a68bc90ccf1098e9646092baacaa87 # v1.6.0
        with:
          version: pnpm exec changeset version
          commit: 'chore(release): changeset created a new release'
          title: 'Release [changeset]'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    runs-on: ubuntu-latest
    environment: production
    needs: determine-changesets-step
    if: needs.determine-changesets-step.outputs.action == 'publish'
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@f2acddfb5195534d487896a656232b016a682f3c
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release
        uses: changesets/action@c48e67d110a68bc90ccf1098e9646092baacaa87 # v1.6.0
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
          commit: 'chore(release): changeset created a new release'
          title: 'Release [changeset]'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
