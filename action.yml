name: OpenAPI Sync
description: GitHub Action that synchronizes OpenAPI schema files between repositories
branding:
  icon: upload
  color: orange

inputs:
  source_path:
    description: 'Source repository path'
    required: true
  config_path:
    description: 'Path to the sync config file'
    required: true
  target_repo:
    description: 'Target repository name. Must be under the same owner as the source repo.'
    required: true
  target_branch:
    description: 'Branch name for the PR in target repo'
    required: true
  target_repo_github_token:
    description: 'GitHub token for target repo access (checkout, PR creation, labels, status comments)'
    required: true
  source_repo_github_token:
    description: 'GitHub token for source repo access (commenting on source PRs)'
    required: false
  pr_title:
    description: 'Pull Request title'
    required: false
    default: 'Sync OpenAPI Schema'
  commit_message:
    description: 'Commit message'
    required: false
    default: 'chore: sync OpenAPI schema'
  labels:
    description: 'Comma-separated PR labels'
    required: false
    default: ''
  dry_run:
    description: 'Only report diff'
    required: false
    default: 'false'
  source_pr_number:
    description: 'Source PR number'
    required: false
  source_pr_merged:
    description: 'Whether the source PR is already merged (true/false). If false, adds warning to target PR.'
    required: false
    default: 'true'
  comment_on_source_pr:
    description: 'Whether to post a link comment on the source PR (true/false).'
    required: false
    default: 'true'

outputs:
  has_diff:
    description: 'Whether meaningful changes were detected'
    value: ${{ steps.sync.outputs.has_diff }}
  diff_summary:
    description: 'Summary of changes'
    value: ${{ steps.sync.outputs.diff_summary }}
  target_pr_number:
    description: 'PR number created/updated in target repo'
    value: ${{ steps.create_pr.outputs.pull-request-number }}

runs:
  using: 'composite'
  steps:
    - name: Checkout target repository
      uses: actions/checkout@v4
      with:
        token: ${{ inputs.target_repo_github_token }}
        repository: ${{ github.repository_owner }}/${{ inputs.target_repo }}
        path: target
        persist-credentials: false
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Run OpenAPI Sync
      id: sync
      shell: bash
      run: |
        node ${{ github.action_path }}/dist/cli-sync.cjs \
          --config "${{ inputs.config_path }}" \
          --source-root "${{ inputs.source_path }}" \
          --target-root "target" \
          ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}

    - name: Generate diff patch
      if: steps.sync.outputs.has_diff == 'true'
      shell: bash
      run: |
        cd target
        git add -A
        git diff --cached --no-color > "$RUNNER_TEMP/openapi-sync.patch"
        git reset

    - name: Upload diff artifact
      if: steps.sync.outputs.has_diff == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: openapi-sync-diff
        path: ${{ runner.temp }}/openapi-sync.patch

    - name: Create or Update Pull Request
      id: create_pr
      if: inputs.dry_run == 'false' && steps.sync.outputs.has_diff == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        path: target
        token: ${{ inputs.target_repo_github_token }}
        commit-message: ${{ inputs.commit_message }}
        title: ${{ inputs.pr_title }}
        body: ${{ steps.sync.outputs.pr_body }}
        branch: ${{ inputs.target_branch }}
        delete-branch: true
        labels: ${{ inputs.labels }}

    - name: PR lifecycle actions
      if: inputs.dry_run == 'false' && steps.sync.outputs.has_diff == 'true' && inputs.source_pr_number != ''
      shell: bash
      env:
        TARGET_REPO_GITHUB_TOKEN: ${{ inputs.target_repo_github_token }}
        SOURCE_REPO_GITHUB_TOKEN: ${{ inputs.source_repo_github_token }}
      run: |
        node ${{ github.action_path }}/dist/cli-pr.cjs \
          --source-repo "${{ github.repository }}" \
          --source-pr "${{ inputs.source_pr_number }}" \
          --source-pr-merged "${{ inputs.source_pr_merged }}" \
          --target-repo "${{ github.repository_owner }}/${{ inputs.target_repo }}" \
          --target-pr "${{ steps.create_pr.outputs.pull-request-number }}" \
          --comment-on-source-pr "${{ inputs.comment_on_source_pr }}"
